name: Deploy to Screeps Live
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Inject Secure Credentials
        run: |
          cat << EOF > screeps.json
          {
            "main": {
              "token": "${{ secrets.SCREEPS_TOKEN }}",
              "host": "screeps.com",
              "protocol": "https",
              "port": 443,
              "path": "/",
              "branch": "main"
            }
          }
          EOF

      - name: Build and Push to MMO Server
        run: SCREEPS_TARGET=main DEPLOY=true npx rollup -c