name: Deploy to Screeps Live
on:
  push:
    branches:
      - main

jobs:
  validate_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Gate 1 - Code Formatting & Linting
        run: npm run lint

      - name: Gate 2 - Strict Typechecking
        run: npm run typecheck

      - name: Gate 3 - Unit Testing
        run: npm run test --if-present

      - name: Inject Secure Credentials
        env:
          SCREEPS_TOKEN: ${{ secrets.SCREEPS_TOKEN }}
        run: |
          node -e "
          const fs = require('fs');
          const token = process.env.SCREEPS_TOKEN;
          if (!token) {
            console.error('CRITICAL: SCREEPS_TOKEN is empty or not found in GitHub Secrets!');
            process.exit(1);
          }
          const config = {
            main: {
              token: token.trim(),
              host: 'screeps.com',
              protocol: 'https',
              port: 443,
              path: '/',
              branch: 'main'
            }
          };
          fs.writeFileSync('screeps.json', JSON.stringify(config, null, 2));
          console.log('screeps.json generated securely.');
          "

      - name: Build and Push to MMO Server
        run: SCREEPS_TARGET=main DEPLOY=true npx rollup -c
